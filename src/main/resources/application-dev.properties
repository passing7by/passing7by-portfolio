spring.application.name=passing7by-portfolio


###################### port
# ip주소만 입력해도 접속 가능하도록 포트번호를 well known port로 변경
server.port=80


###################### JSP
# spring boot는 jsp를 지원하지 않음
# jsp를 사용하고 싶다면 별도의 plugin을 설치한 다음
# properties에 prefix, suffix를 작성해 주어야 함
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp


###################### DB
spring.datasource.username=port_admin
spring.datasource.password=port_admin

## 개발시 사용
#spring.datasource.url=jdbc:mysql://localhost:3306/passing7by-portfolio
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
## 개발시 사용 (log4jdbc - 쿼리문, 데이터 조회 결과 로깅)
# log4jdbc.log4j2.properties 와 logback-spring.xml 도 resources에 추가해야 쓸데없는 db 커넥션 로그가 안 뜸
spring.datasource.url=jdbc:log4jdbc:mysql://localhost:3306/passing7by-portfolio
spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
## 운영시 사용


